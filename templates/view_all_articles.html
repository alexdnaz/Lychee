<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View All Articles</title>
</head>
<body>
    <h2>All Articles</h2>
    <ul>
        {% for article in articles %}
            <li>{{ article.title }} - {{ article.content }}</li>
        {% endfor %}
    </ul>
</body>
</html>
